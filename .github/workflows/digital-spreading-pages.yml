name: Publish Digital Spreading Pages

on:
  push:
    branches:
      - main
    paths:
      - "pages/**"
      - "data/**"
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - "HANDOFF.md"
      - ".github/workflows/digital-spreading-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: digital-spreading-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish pages folder to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./pages
          force_orphan: true
