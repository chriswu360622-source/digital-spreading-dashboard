name: Deploy Digital Spreading Pages

on:
  push:
    branches:
      - main
    paths:
      - "pages/**"
      - "data/**"
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "README.md"
      - "HANDOFF.md"
      - ".github/workflows/digital-spreading-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: digital-spreading-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
